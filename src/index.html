<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0f1a" />
    <title>BIJOY PRODUCTION</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body data-theme="dark" data-lang="bn">
    <!-- App-lock overlay (shown when a PIN is set) -->
    <div id="lock-overlay" class="lock-overlay hidden" aria-hidden="true">
      <div class="lock-card">
        <h1 class="lock-title" data-i18n="lock.title">App Locked</h1>
        <p class="lock-sub" data-i18n="lock.sub">Enter your 4-digit PIN</p>
        <input
          id="lock-input"
          class="lock-input"
          type="password"
          inputmode="numeric"
          maxlength="4"
          autocomplete="off"
        />
        <button id="lock-submit" class="btn btn-primary" data-i18n="lock.unlock">
          Unlock
        </button>
        <p id="lock-error" class="lock-error"></p>
      </div>
    </div>

    <!-- Main app shell -->
    <div id="app" class="app hidden">
      <header class="appbar">
        <div class="appbar-left">
          <button
            id="btn-menu"
            class="icon-btn"
            aria-label="Menu"
            title="Menu"
          >
            ☰
          </button>
          <div class="appbar-title">
            <div class="brand" data-i18n="brand">BIJOY PRODUCTION</div>
            <button id="company-picker" class="company-picker">
              <span id="company-name">—</span>
              <span class="caret">▾</span>
            </button>
          </div>
        </div>
        <div class="appbar-right">
          <button
            id="btn-lang"
            class="icon-btn"
            aria-label="Language"
            title="Language"
          >
            <span id="lang-flag">বাং</span>
          </button>
        </div>
      </header>

      <!-- Drawer -->
      <nav id="drawer" class="drawer hidden">
        <a href="#/dashboard" data-i18n="nav.dashboard">Dashboard</a>
        <a href="#/sales" data-i18n="nav.sales">Sales</a>
        <a href="#/purchases" data-i18n="nav.purchases">Purchases</a>
        <a href="#/products" data-i18n="nav.products">Products</a>
        <a href="#/parties" data-i18n="nav.parties">Customers &amp; Suppliers</a>
        <a href="#/stock-report" data-i18n="nav.stockReport">Stock report</a>
        <a href="#/sales-report" data-i18n="nav.salesReport">Sales report</a>
        <a href="#/companies" data-i18n="nav.companies">Companies</a>
        <a href="#/backup" data-i18n="nav.backup">Backup &amp; Restore</a>
        <a href="#/import-legacy" data-i18n="nav.importLegacy">
          Import legacy data
        </a>
        <a href="#/settings" data-i18n="nav.settings">Settings</a>
      </nav>
      <div id="drawer-scrim" class="drawer-scrim hidden"></div>

      <main id="view" class="view"></main>

      <nav class="bottom-nav">
        <a href="#/dashboard" data-route="dashboard">
          <span class="bn-ico">🏠</span>
          <span class="bn-lbl" data-i18n="nav.home">Home</span>
        </a>
        <a href="#/sales/new" data-route="sales-new" class="bn-primary">
          <span class="bn-ico">＋</span>
          <span class="bn-lbl" data-i18n="nav.newBill">New Bill</span>
        </a>
        <a href="#/stock-report" data-route="stock-report">
          <span class="bn-ico">📦</span>
          <span class="bn-lbl" data-i18n="nav.stock">Stock</span>
        </a>
        <a href="#/settings" data-route="settings">
          <span class="bn-ico">⚙</span>
          <span class="bn-lbl" data-i18n="nav.more">More</span>
        </a>
      </nav>

      <!-- Toast container -->
      <div id="toast-root" class="toast-root" aria-live="polite"></div>

      <!-- Modal root -->
      <div id="modal-root" class="modal-root hidden">
        <div class="modal-scrim"></div>
        <div class="modal-card" id="modal-card"></div>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
