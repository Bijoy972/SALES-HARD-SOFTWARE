name: Build signed APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Bump versionCode and versionName
        id: version
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          VERSION_NAME="1.0.${BUILD_NUMBER}"
          node scripts/set-version.mjs "${BUILD_NUMBER}" "${VERSION_NAME}"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Inject signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          mkdir -p android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          bash scripts/inject-signing.sh

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          cp "$APK" bijoy-production.apk
          echo "path=bijoy-production.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bijoy-production-${{ steps.version.outputs.version_name }}
          path: bijoy-production.apk
          if-no-files-found: error

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: BIJOY PRODUCTION ${{ steps.version.outputs.version_name }}
          body: |
            Automated release built from commit ${{ github.sha }}.

            **Install:** download `bijoy-production.apk` below, open it on your phone,
            allow "Unknown source" if prompted, install. Offline. No account needed.
          files: bijoy-production.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
